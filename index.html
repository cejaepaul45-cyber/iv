<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart IV Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2 { color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px;}
        button:hover { background-color: #2563eb; }
        
        /* Dashboard Styles */
        #dashboard-section { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; }
        .data-value { font-size: 36px; font-weight: bold; color: #f59e0b; }
        .data-label { color: #64748b; font-size: 14px; }
        
        .status-NORMAL { color: #10b981; font-weight: bold; }
        .status-FAST { color: #ef4444; font-weight: bold; }
        .status-SLOW { color: #f59e0b; font-weight: bold; }

        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-control { flex: 1; background-color: #475569; }
        .btn-control:hover { background-color: #334155; }
    </style>
</head>
<body>

<div class="container" id="form-section">
    <h1>Patient Admission</h1>
    <form id="patientForm">
        <div class="form-group"><label>Patient Name:</label><input type="text" id="pName" required></div>
        <div class="form-group"><label>Age:</label><input type="number" id="pAge" required></div>
        <div class="form-group"><label>Medication / Fluid:</label><input type="text" id="pMed" required></div>
        <div class="form-group"><label>Patient ID:</label><input type="text" id="pID" required></div>
        <div class="form-group"><label>Room & Bed:</label><input type="text" id="pRoom" required></div>
        <button type="submit">Start Monitoring</button>
    </form>
</div>

<div class="container" id="dashboard-section">
    <h1 id="displayName">Patient Monitoring</h1>
    <p>ID: <span id="displayID"></span> | Room: <span id="displayRoom"></span> | Med: <span id="displayMed"></span></p>
    
    <div class="grid">
        <div class="card">
            <div class="data-label">Current IV Flow Rate</div>
            <div class="data-value" id="dashCurrentDPM">--</div>
            <div class="data-label">drops/min</div>
            <div style="margin-top: 10px;">Status: <span id="dashStatus">Waiting...</span></div>
        </div>

        <div class="card">
            <div class="data-label">Remaining IV Fluid</div>
            <div class="data-value" id="dashFluid" style="color: #ef4444;">--</div>
            <div class="data-label">mL</div>
        </div>
    </div>

    <h2>IV Servo Controls</h2>
    <div class="controls">
        <button class="btn-control" id="btn3Drops">Set to 3 Drops/Min</button>
        <button class="btn-control" id="btn5Drops">Set to 5 Drops/Min</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // YOUR FIREBASE CONFIGURATION HERE
    const firebaseConfig = {
        apiKey: "AIzaSyBsA2FdCUhA1qtNbZo_QhkxG1SOH1Tg-og",
        authDomain: "iv-test-1.firebaseapp.com",
        databaseURL: "https://iv-test-1-default-rtdb.asia-southeast1.firebasedatabase.app"
        projectId: "iv-test-1",
        storageBucket: "iv-test-1.firebasestorage.app",
        messagingSenderId: "560948093921",
        appId: "1:560948093921:web:6f6df756a5c4f73e6c68a0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Form Submission Logic
    document.getElementById('patientForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Gather data
        const patientData = {
            name: document.getElementById('pName').value,
            age: document.getElementById('pAge').value,
            medication: document.getElementById('pMed').value,
            id: document.getElementById('pID').value,
            room: document.getElementById('pRoom').value
        };

        // Save to Firebase
        set(ref(db, 'iv_system/patient_info'), patientData)
        .then(() => {
            // Update UI
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            
            document.getElementById('displayName').innerText = patientData.name;
            document.getElementById('displayID').innerText = patientData.id;
            document.getElementById('displayRoom').innerText = patientData.room;
            document.getElementById('displayMed').innerText = patientData.medication;
        })
        .catch((error) => { alert("Error saving data: " + error); });
    });

    // Listen for Sensor Data from ESP32
    const currentDPRef = ref(db, 'iv_system/currentDPM');
    onValue(currentDPRef, (snapshot) => {
        document.getElementById('dashCurrentDPM').innerText = snapshot.val() || 0;
    });

    const fluidRef = ref(db, 'iv_system/remainingFluid');
    onValue(fluidRef, (snapshot) => {
        document.getElementById('dashFluid').innerText = snapshot.val() || 0;
    });

    const statusRef = ref(db, 'iv_system/status');
    onValue(statusRef, (snapshot) => {
        const status = snapshot.val() || "NORMAL";
        const statusSpan = document.getElementById('dashStatus');
        statusSpan.innerText = status;
        statusSpan.className = `status-${status}`; // Applies color based on CSS
    });

    // Button Controls to send commands to ESP32
    document.getElementById('btn3Drops').addEventListener('click', () => {
        update(ref(db, 'iv_system'), { targetDPM: 3 });
        alert("Target set to 3 DPM");
    });

    document.getElementById('btn5Drops').addEventListener('click', () => {
        update(ref(db, 'iv_system'), { targetDPM: 5 });
        alert("Target set to 5 DPM");
    });
</script>
</body>
</html>
